server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Docker's embedded DNS. Needed because nginx resolves a literal upstream
  # hostname exactly once, at config load, and then caches that IP forever —
  # so recreating the api container leaves nginx dialing a dead address and
  # every /api call returns 502 until nginx itself is restarted.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # SPA fallback.
  location / {
    try_files $uri /index.html;
  }

  # Everything /api goes to the api service.
  location /api/ {
    # Using a variable forces nginx to re-resolve on each request (honouring
    # the resolver TTL above). It also stops nginx rewriting the URI, so the
    # original path has to be passed through explicitly.
    set $api_upstream api;
    proxy_pass http://$api_upstream:8710$request_uri;

    proxy_set_header Host $host;
    proxy_read_timeout 300s;

    # SSE (/api/ask/stream) must not be buffered or chunk-collapsed, or the
    # client sees the whole answer arrive at once when the stream closes.
    proxy_buffering off;
    proxy_cache off;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
  }

  gzip on;
  gzip_types text/css application/javascript application/json font/woff2;
}
